appId: com.syncflow.desktop
productName: SyncFlow
mac:
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  icon: resources/icon.icns
  sign: ./scripts/mac-sign.cjs
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  binaries:
    - Contents/Resources/syncflow-sidecar
  extraResources:
    - from: resources/syncflow-sidecar
      to: syncflow-sidecar
win:
  artifactName: ${productName}-Setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: SyncFlow
  extraResources:
    - from: resources
      filter:
        - syncflow-sidecar.exe
        - dns-sd.exe
        - dnssd.dll
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: SyncFlow
directories:
  output: release
  buildResources: resources
