version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # React Native tooling packages must be upgraded together with react-native.
      - dependency-name: '@react-native/codegen'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /services/sidecar-go
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: bundler
    directory: /apps/mobile
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: gradle
    directory: /apps/mobile/android
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # React Native 0.84 tooling cannot read Gradle 9.6 Kotlin metadata.
      - dependency-name: gradle-wrapper
        versions: ['>= 9.0.0']
      # AndroidX Core 1.19 requires Android Gradle Plugin 9.1 or newer.
      - dependency-name: androidx.core:core
        versions: ['>= 1.19.0']
